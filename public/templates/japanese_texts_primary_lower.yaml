texts:
- node_type: TEXT_ROOT
  id: lesson-026
  content: 第26課
  content_json:
    level: N4
    book: 初级下册
    type: lesson
  patterns:
  - 生け花の先生を紹介してもらえませんでした。
  - あなたが行ったら旅行を楽しんでください。
  examples:
  - 渡辺さんにいつ大阪へ行くか聞いてみました。大阪に住んでいます。
  - どこへ行くか聞いてみました。
  - 誰が来ますか。山田さんが来ます。
  - どこへ行きますか。カナダへ行きます。
  - 日本語が少し分かるようになりました。
  - 会社の仕事を見学させていただきました。
  dialogue:
    title: ごみはどこに出したらいいですか
    content:
    - '管理人: ミラーさん、引っ越しの荷物は片付きましたか。'
    - 'ミラー: はい、だいたい片付きました。あのう、ごみを捨てたいんですが、どこに出したらいいですか。'
    - '管理人: 燃えるごみは月曜日と木曜日の朝出してください。ごみ置き場は駐車場の横です。'
    - 'ミラー: ビンや缶はいつですか。'
    - '管理人: 土曜日です。'
    - 'ミラー: ありがとうございます。'
    - 'ミラー: わかりました。それから、お湯が出ないんですが。'
    - '管理人: ガス会社に連絡したら、すぐ来てくれますよ。'
    - 'ミラー: すみませんが、電話番号を教えていただけませんか。'
    - '管理人: ええ、いいですよ。'
- node_type: TEXT_ROOT
  id: lesson-027
  content: 第27課
  content_json:
    level: N4
    book: 初级下册
    type: lesson
  patterns:
  - 日本語が少し話せるようになりました。
  - 山田さんに会えるようになりました。
  - 前はコンピューターが使えませんでした。
  examples:
  - 日本語の新聞が読めるようになりましたか。元、読めません。
  - あの声が水の音が聞こえますか。元元。春が来ました。
  - 法隆寺に行けるようになりましたか。7年に行けるようになりました。
  - どこで会えますか。駅前で会えます。
  dialogue:
    title: 何でも作れるんですね
    content:
    - 'ミラー: 明るくていい部屋ですね。'
    - '鈴木: ええ、天気がいい日には海が見えるんです。'
    - 'ミラー: このテーブルはおもしろいデザインですね。どこで買ったんですか。'
    - '鈴木: これはわたしが作ったんですよ。'
    - 'ミラー: えっ、ほんとうですか。'
    - '鈴木: ええ、趣味は自分で額を作ることなんです。'
    - 'ミラー: へえ。では、あの本棚も作ったんですか。'
    - '鈴木: ええ。'
    - 'ミラー: すごいですね。鈴木さん、何でも作れるんですね。'
    - '鈴木: わたしの夢はいつか自分で家を建てることなんです。'
    - 'ミラー: すばらしい夢ですね。'
- node_type: TEXT_ROOT
  id: lesson-028
  content: 第28課
  content_json:
    level: N4
    book: 初级下册
    type: lesson
  patterns:
  - 音楽を聴きながら食事をします。
  - 朝ごはんを食べながら新聞を読みます。
  - 地下鉄は速いです。でも、安いので、地下鉄で行きます。
  examples:
  - 眠くなりながら運転をします。
  - 音楽を聴きながら勉強をします。
  - 彼は大学に行きました。でも、辞書を忘れました。
  - この本は面白いです。でも、高いです。
  - トム先生は熱心で、親切です。でも、先生は厳しいです。
  - 友達が来ます。食事に来ます。
  - 富士大学に行きます。でも、寮に住みます。
  dialogue:
    title: 出張が多いので、……
    content:
    - 'ミラー: 何をしていますか。'
    - '小川幸子: アメリカに出張の準備をしています。'
    - 'ミラー: いつ行きますか。'
    - '小川幸子: 来月です。'
    - 'ミラー: 出張は多いですか。'
    - '小川幸子: 元元。でも、友達と英語を勉強したり……。'
    - 'ミラー: 元元。'
    - '小川幸子: でも、上手になりません。'
    - 'ミラー: 先生に英語を教えてもらっていますか。'
    - '小川幸子: 元？ 先生？ いいえ。'
    - '小川幸子: でも、あのう……。'
    - 'ミラー: どうしましたか。'
    - '小川幸子: はい。'
    - 'ミラー: まだですか。'
- node_type: TEXT_ROOT
  id: lesson-029
  content: 第29課
  content_json:
    level: N4
    book: 初级下册
    type: lesson
  patterns:
  - 財布をなくしてしまいました。
  - 鍵を忘れてしまいました。
  examples:
  - 何をなくしてしまいましたか。
  - どこに鍵を忘れてしまいましたか。
  - 誰が来てしまいましたか。
  - お先に失礼してしまいます。
  - 何を食べてしまいましたか。
  - どこに行ってしまいましたか。
  dialogue:
    title: 忘れ物をしてしまったんです
    content:
    - '客: すみません、今の電車に忘れ物をしてしまったんですが。'
    - '駅員: 何を忘れたんですか。'
    - '客: 青いかばんです。このくらいの大きさで、外側に大きいポケットが付いています。'
    - '駅員: どの辺に置きましたか。'
    - '客: よく覚えていません。でも網棚の上に置きました。'
    - '駅員: 中に何が入っていますか。'
    - '客: えーと、確か本と傘が入っています。'
    - '駅員: じゃ調べますからちょっと待っていてください。'
    - '駅員: ありましたよ。'
    - '客: ああ、よかった。'
    - '駅員: 今新宿駅にありますがどうしますか。'
    - '客: すぐ取りに行きます。'
    - '駅員: じゃ新宿駅の事務所に行ってください。'
    - '客: はい、どうもありがとうございました。'
- node_type: TEXT_ROOT
  id: lesson-030
  content: 第30課
  content_json:
    level: N4
    book: 初级下册
    type: lesson
  patterns:
  - 地震が起こるかもしれません。
  - 旅行のチケットを買っておきます。
  examples:
  - 雨が降るかもしれませんか。元？ そうですか。
  - テニスのボールを買っておきます。
  - 誰が来るかもしれませんよ。元、来ません。
  - 何を食べておきますか。
  - 資料をコピーしておきます。
  dialogue:
    title: 非常袋
    content:
    - 'ミラー: ここに何がありますか。'
    - '管理人: 非常袋です。'
    - 'ミラー: 非常袋？ 何ですか。'
    - '管理人: 非常の時に使う物を入れた袋です。生活に必要な物を入れてあります。'
    - 'ミラー: 水とお菓子が入っていますか。'
    - '管理人: 元、あの中に入っています。'
    - 'ミラー: いつ備えておきますか。'
- node_type: TEXT_ROOT
  id: lesson-031
  content: 第31課
  content_json:
    level: N4
    book: 初级下册
    type: lesson
  patterns:
  - 疲れたので、早く寝ます。
  - 用事があるので、早く帰ります。
  examples:
  - 疲れたので、体はどうですか？ 大丈夫です。
  - お正月に何をしますか。
  - レポートはおわりましたか。
  - 何を食べましたか。
  - 夏休みに国へ帰りましたか。はい、帰りました。
  - コンサートに出ましたか。はい、出ました。
  dialogue:
    title: ''
    content:
    - '小川: 来月単身赴任で東京へ行きます。'
    - 'ミラー: 元？ 本当ですか。'
    - '小川: はい、本社に単身赴任です。'
    - 'ミラー: 奥さんと息子さんは東京に残すんですか。'
    - '小川: 元元、息子が来年大学に入るので、東京に残すと言っています。妻も会社に残ると言っています。'
    - 'ミラー: では、別々に住むんですか。'
    - '小川: はい、2ヶ月に一回帰ってきます。'
    - 'ミラー: 大変ですね。'
    - '小川: はい、でも、仕事ですから。'
    - 'ミラー: そうですね。'
- node_type: TEXT_ROOT
  id: lesson-032
  content: 第32課
  content_json:
    level: N4
    book: 初级下册
    type: lesson
  patterns:
  - 毎日働きすぎます。
  - 大雪が降りました。
  - 風邪を引かないようにします。
  examples:
  - 何を食べすぎましたか。
  - 10時には家に着くようにしますか。はい、着くようにします。
  - 先生に会うようにします。はい、先生に会うようにします。
  - 心配しないでください。
  - 体の調子はどうですか。
  dialogue:
    title: 無理をしないで
    content:
    - '小川: 元気ですね。'
    - 'ミラー: はい。でも、時々お腹が痛くなったりします。'
    - '小川: どうしてですか。仕事が忙しいですか。'
    - 'ミラー: はい。残業が多いです。'
    - '小川: ストレスかもしれませんね。'
    - 'ミラー: 元元、そうです。'
    - '小川: 無理をしないでください。'
    - 'ミラー: はい、仕事が終わったら休みます。'
    - '小川: そうですね。'
- node_type: TEXT_ROOT
  id: lesson-033
  content: 第33課
  content_json:
    level: N4
    book: 初级下册
    type: lesson
  patterns:
  - 窓を開けなさい。
  - 勉強しなさい。
  - 立入禁止、入ってはいけません。
  - ここに駐車してはいけません。
  examples:
  - 机の上を片付けなさい。机を片付けなさい。500円払いなさい。
  - 時々水を飲みなさい。
  - このペンを使いなさい。後で「ありがとう」と言いなさい。
  - 漢字は何と書きますか。「大丈夫」と書きます。
  - ここに入ってはいけません。
  - タバコを吸ってはいけません。
  - 渡辺さんは何時に来ますか。6時に来ます。
  dialogue:
    title: ''
    content:
    - 'ミラー: あの漢字は何と書きますか。'
    - '大学員: 「駐車禁止」と書きます。'
    - 'ミラー: どういう意味ですか。'
    - '大学員: 駐車を止めてはいけないという意味です。これは正しいですか。'
    - 'ミラー: そうですか。罰金を払わなければなりませんか。'
    - '大学員: 元、はい、1,000円払わなければなりません。'
    - 'ミラー: そうですか。1,000円ですか。'
- node_type: TEXT_ROOT
  id: lesson-034
  content: 第34課
  content_json:
    level: N4
    book: 初级下册
    type: lesson
  patterns:
  - 先生の言うように、書きなさい。
  - ご飯を食べたあとで歯を磨きます。
  - コーヒーに砂糖を入れないで飲みます。
  examples:
  - これは新しいコンピューターです。マウスを動かすようにします。
  - ここに立ってはいけません。
  - ここに入ってはいけません。はい、入りません。
  - 結婚式の後で何をしますか。
  - 何を食べた後で歯を磨きますか。
  - このミルクを飲まないでください。
  - 最近何を食べないでいますか。魚を食べないでいます。
  dialogue:
    title: ''
    content:
    - '渡辺: 一度お茶の作法を見て……。'
    - '茶道先生: はい。'
    - '渡辺: お菓子を食べます。'
    - '茶道先生: はい、先にお菓子を食べます。'
    - '渡辺: はい。'
    - '茶道先生: 甘いお菓子を食べた後でお茶を飲みます。'
    - '渡辺: はい。'
    - '茶道先生: お茶を飲んだら、次におちゃわんを2回回しながら置きなさい。'
    - '渡辺: はい。'
    - '茶道先生: これです。'
    - '渡辺: はい。'
    - '茶道先生: 苦いですか。'
    - '渡辺: はい。'
- node_type: TEXT_ROOT
  id: lesson-035
  content: 第35課
  content_json:
    level: N4
    book: 初级下册
    type: lesson
  patterns:
  - 春になれば、花が咲きます。
  - 天気がよければ、向こうに海が見えます。
  - 北海道へ行くなら、6月がいいです。
  examples:
  - 雨が降れば、……。
  - 意見があれば、言ってください。元、特にありません。できれば、これで終わりましょう。
  - 日本の生活はどうですか。便利です。もし暇があれば、遊びに来てください。
  - このレポートを提出しなければなりませんか。
  - 本を借りるなら、どうしますか。
  dialogue:
    title: ''
    content:
    - 'サントス: あのう、冬スキーに行こうと思います。'
    - 'ミラー: そうですか。'
    - 'サントス: 3日間行こうと思います。'
    - 'ミラー: どこへ行きますか。'
    - 'サントス: では、草津高原です。でも、温泉も……。'
    - 'ミラー: そうですか。'
    - 'サントス: JRで行って夜に着き、朝からスキーをするのが便利です。'
    - 'ミラー: そうですね。'
    - 'サントス: 全部スキー用具を借りようと思います。でも、心配です。でも、旅館で予約をしておけば……。'
    - 'ミラー: そうですね。'
- node_type: TEXT_ROOT
  id: lesson-036
  content: 第36課
  content_json:
    level: N4
    book: 初级下册
    type: lesson
  patterns:
  - 速く走れるように、毎日練習します。
  - 日本語が話せるように、毎日勉強します。
  examples:
  - その子は辞書が引けるようになりました。
  - サントスさんは日本語が話せるようになりました。
  - 日本の食べ物に慣れるようになりました。
  - ピアノが弾けるようになりましたか。元、弾けません。少し弾けるようになりました。
  - 新しい仕事に慣れるようになりましたか。
  - 甘い物は食べないようにします。
  - お酒を飲まないように、入れてくださいませんか。はい、入れます。
  - 小川さんは何をするようにしますか。小川さんは毎日運動をするようにします。
  dialogue:
    title: ''
    content:
    - '小川: この方法はどうですか。'
    - 'ミラー: はい。特別なことをするようにします。'
    - '小川: 毎日運動をするようにします。'
    - 'ミラー: 運動は何をするようにしますか。'
    - '小川: スポーツジムに行ったり、水泳をしたり……。最近は500メートル泳げるようになりました。'
    - 'ミラー: そうですか。食べ物は？'
    - '小川: 何でも食べます。特に魚が好きです。'
    - 'ミラー: 毎日何を作るようにしますか。'
    - '小川: 元、来月フランスへ行くので、フランス語を勉強し始めました。'
    - 'ミラー: そうですか。'
- node_type: TEXT_ROOT
  id: lesson-037
  content: 第37課
  content_json:
    level: N4
    book: 初级下册
    type: lesson
  patterns:
  - 先生に呼ばれました。
  - 電車に足を踏まれました。
  - 法隆寺は607年に建てられました。
  examples:
  - 部屋で誰に呼ばれましたか。何を言いましたか。
  - どこで足を踏まれましたか。駅前で踏まれました。
  - まだ新星が見つかれましたよ。はい、見つかれました。
  - 会議は誰に開かれましたか。島田さんに開かれました。
  - コーヒーはどこで飲まれましたか。この店で飲まれました。
  - このペンは何に使われますか。
  dialogue:
    title: 金閣寺は14世紀に建てられました
    content:
    - 'ミラー: 金閣寺は有名ですね。'
    - 'ガオ: はい、金閣寺は14世紀に建てられました。'
    - 'ミラー: 1950年に焼失しましたね。'
    - 'ガオ: はい、その後新しく建てられました。19世紀に建てられました。'
    - 'ミラー: そうですか。壁は金色で、本物の金ですか。'
    - 'ガオ: はい、です。'
    - 'ミラー: そうですか。あそこに入れますか。'
    - 'ガオ: 中に入れません。'
    - 'ミラー: 紅葉はいつ見れますか。'
    - 'ガオ: 元、寺の周りは秋が特に美しいと言われています。'
- node_type: TEXT_ROOT
  id: lesson-038
  content: 第38課
  content_json:
    level: N4
    book: 初级下册
    type: lesson
  patterns:
  - 絵を描くのが好きです。
  - 星を見るのが好きです。
  - 泳ぐのが上手です。
  - 来月日本へ行くのが楽しみです。
  examples:
  - 記事を書くのが始めました。
  - その机で庭の手入れをするのが好きです。
  - 東京へ行くのが嫌いです。はい、嫌いです。
  - 何を食べるのが好きですか。寿司を食べるのが好きです。
  - 誰を知っているのが好きですか。
  - わたしの好きな彼女は音楽の先生です。
  dialogue:
    title: ''
    content:
    - '大学員: トム先生、お世話になります。'
    - 'トム: はい。'
    - '大学員: 先生の研究室はどこですか。'
    - 'トム: わたしの好きな本はこれです。'
    - '大学員: 本がたくさんあります……。整理の上手さがすごいです。'
    - 'トム: 「上手な整理の方法」という本のことですね。'
    - '大学員: 元、はい。'
    - 'トム: あの本屋で売っています。'
    - '大学員: はい。'
    - 'トム: 日本に来てから、どうですか。'
    - '大学員: とても楽しいです。'
    - 'トム: 先月、押入れの整理をしませんでしたか。'
- node_type: TEXT_ROOT
  id: lesson-039
  content: 第39課
  content_json:
    level: N4
    book: 初级下册
    type: lesson
  patterns:
  - 遅刻をしたので、謝りました。
  - 地震がでたので、建物が倒れました。
  - 体の調子が悪かったので、病院へ行きました。
  examples:
  - 何をしたので、怒られましたか。写真を見たので、怒られました。
  - 今度の日曜日に何をするので、行きませんか。試験があるので、行きません。
  - どうしたので、泣きましたか。
  - 事故がでたので、バスが遅れました。
  - 飲みに行きませんか。はい、行きます。でも、疲れたので、行きません。
  - 最近どうしたので、悪いですか。部屋が狭くて、邪魔な友達が来たので、悪いです。
  dialogue:
    title: ''
    content:
    - '中村課長: 事故がでたので、どうしましたか。'
    - 'ミラー: はい。'
    - '中村課長: それは大変ですね。'
    - 'ミラー: はい、心配です。'
    - 'ミラー: 話があります。'
    - '中村課長: はい。'
    - 'ミラー: 会議が始まります。'
    - '中村課長: はい。'
    - 'ミラー: 課長、あのう、今日人が来ます。'
    - '中村課長: はい。'
- node_type: TEXT_ROOT
  id: lesson-040
  content: 第40課
  content_json:
    level: N4
    book: 初级下册
    type: lesson
  patterns:
  - JRは何時に出発しますか。
  - 9時に到着します。
  examples:
  - 次の会議はいつにしますか。水曜日にします。
  - どこで会うことにしましたか。レストランにしました。
  - いつ会うことにしましたか。忘年会の返事を待つことにしました。
  - 何を食べることにしましたか。はい、しました。
  - 大学に行くことにしませんでした。はい、しませんでした。
  - 課長に話すことにしました。
  dialogue:
    title: ''
    content:
    - 'ミラー: 先生、ホームステイの学校はどうですか。友達ができるかどうか、心配です……。'
    - '伊藤先生: 大丈夫です。ホームステイの人は親切です。'
    - 'ミラー: はい。安心しました。'
    - '伊藤先生: 日本語の勉強はどうですか。'
    - 'ミラー: がんばっています。'
