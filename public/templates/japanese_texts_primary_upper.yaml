texts:
- node_type: TEXT_ROOT
  id: lesson-001
  content: 第1課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - 〇〇です。
  - 〇〇は学生です。
  - 〇〇は会社員です。
  - 〇〇は会社員ではありません。
  examples:
  - わたしはﾏｲｸ･ﾐﾗｰです。
  dialogue:
    title: 初めまして
    content:
    - '佐藤: おはようございます。'
    - '山田: おはようございます。佐藤さん、こちらはﾏｲｸ･ﾐﾗｰさんです。'
    - 'ﾐﾗｰ: 初めまして。ﾏｲｸ･ﾐﾗｰです。ｱﾒﾘｶから来ました。どうぞよろしく。'
    - '佐藤: 佐藤けい子です。どうぞよろしく。'
- node_type: TEXT_ROOT
  id: lesson-002
  content: 第2課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - これは辞書です。
  - それは傘です。
  - これは本です。
  examples:
  - これはボールです。
  - それはノートですか。元、これは手帳です。
  - それは何ですか。名刺です。
  - これは「9」、それは「7」です。
  - これは何語ですか。
  - あれは誰ですか。佐藤さんです。
  - これはあなたのですか。元、違います。
  - それはどれですか。これです。
  dialogue:
    title: ''
    content:
    - '山田一郎: すみません。'
    - '店員: はい。'
    - 'サントス: これはいくらですか。'
    - '店員: 480円です。'
    - 'サントス: これにします。'
    - '店員: はい。お世話になります。'
    - 'サントス: お世話になります。'
    - '山田一郎: ありがとうございました。'
- node_type: TEXT_ROOT
  id: lesson-003
  content: 第3課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - ここは食堂です。
  - エレベーターはあそこです。
  examples:
  - ここは新大阪ですか。はい、そうです。
  - トイレはどこですか。あそこです。
  - あれは何ですか。会議室です。
  - 事務所はどこですか。あそこです。
  - ここはどこですか。カフェです。
  - この時計はいくらですか。600円です。
  dialogue:
    title: いくらですか
    content:
    - '店員A: すみません。'
    - '客: はい。トイレはどこですか。'
    - '店員A: 地下1階です。'
    - '客: ありがとう。'
    - '店員B: すみません。'
    - '客: はい。これはいくらですか。'
    - '店員B: 日本円で2,500円です。'
    - '客: では、これにします。'
- node_type: TEXT_ROOT
  id: lesson-004
  content: 第4課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - 今は4時5分です。
  - わたしは毎朝6時に起きます。
  - わたしは勉強します。
  examples:
  - 今は何時ですか。3時10分です。
  - 銀行は何時から何時までですか。土曜日と日曜日は休みです。9時から5時までです。
  - 毎晩何時に寝ますか。11時に寝ます。
  - 毎日何時まで勉強しますか。朝9時から午後3時まで勉強します。
  - 土曜日も勉強しますか。元、勉強しません。
  - 昨日も勉強しましたか。元、しませんでした。
  dialogue:
    title: ''
    content:
    - '佐藤: 「コピー」はどこですか。527番ですか。'
    - '店員: 「コピー」はこちらです。'
    - 'ミラー: 十枚コピーします。それから、何時までですか。'
    - '店員: 10時までです。'
    - 'ミラー: 明日は何時までですか。'
    - '店員: 明日は休みです。'
    - 'ミラー: ありがとうございます。'
- node_type: TEXT_ROOT
  id: lesson-005
  content: 第5課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - わたしは京都に行きます。
  - わたしはタクシーで行きます。
  - わたしは家族と日本に来ました。
  examples:
  - あなたはどこに行きますか。京都に行きます。
  - 何曜日に行きますか。日曜日に行きます。
  - 何で京都に行きますか。新幹線で行きます。
  - 東京へ誰と行きますか。山田さんと行きます。
  - 日本にいつ来ましたか。3月5日に来ました。
  - 誕生日はいつですか。6月13日です。
  dialogue:
    title: ''
    content:
    - 'サントス: すみません。甲子園へはどう行きますか。'
    - '駅員: 30番のバスです。'
    - 'サントス: 甲子園は何番線ですか。'
    - '駅員: 5番線です。'
    - 'サントス: ありがとうございます。'
    - '駅員: いいえ。'
    - 'サントス: 甲子園へ行きます。'
    - '運転手: はい。'
- node_type: TEXT_ROOT
  id: lesson-006
  content: 第6課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - わたしは日本酒を飲みます。
  - わたしは歌を歌います。
  - 神戸へ何をしに行きますか。
  - 何を食べますか。
  examples:
  - お酒を飲みますか。元、飲みません。
  - 毎朝何を食べますか。卵を食べます。
  - 日本で何をしますか。勉強したり映画を見たりします。
  - 何を買いますか。雑誌を買います。
  - あなたはテニスをしませんか。元元、します。
  - あそこで10時まで待ちましょう。はい、できます。
  dialogue:
    title: ''
    content:
    - '佐藤: お花見に行きませんか。'
    - 'ミラー: どこへ行きますか。'
    - '佐藤: 大阪城です。'
    - 'ミラー: 何時に行きますか。'
    - '佐藤: 10時に大阪駅で待ちましょう。'
    - 'ミラー: はい。'
    - '佐藤: では、また明日。'
- node_type: TEXT_ROOT
  id: lesson-007
  content: 第7課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - テレビで映画を見ます。
  - 木村さんに花をあげます。
  - トムに手紙を書きます。
  - わたしはお母さんにメールを送りますか。
  examples:
  - テレビで日本語を勉強しますか。元、ラジオで勉強します。
  - 日本語で手紙を書きますか。元、英語で書きます。
  - 「Goodbye」は日本語で何ですか。「さようなら」です。
  - 年賀状を誰に書きますか。先生や友達に書きます。
  - お土産は何にしますか。お茶にします。
  - 何を食べましたか。寿司を食べました。
  dialogue:
    title: ''
    content:
    - '山田一郎: すみません。'
    - 'ミラー: はい。'
    - '山田一郎: 失礼ですが、どちらがミラーさんですか。'
    - 'ミラー: わたしです。'
    - '山田友子: はい。わたしたち、山田です。'
    - 'ミラー: はい。'
    - '山田友子: 元気ですか。'
    - 'ミラー: はい、元気です。会社はどこですか。'
- node_type: TEXT_ROOT
  id: lesson-008
  content: 第8課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - 桜は美しいです。
  - 富士山は高いです。
  - 桜は美しい花です。
  - 富士山は有名な山です。
  examples:
  - 大阪は大きいですか。はい、大きいです。
  - この大学は有名ですか。元、有名ではありません。
  - 今は寒いですか。はい、寒いです。/元、寒くないです。
  - この大学はどうですか。古くて、便利です。
  - この本はどうですか。面白いです。大きいです。
  - 映画を見ましたか。はい、何を見ましたか。「七人の侍」です。
  dialogue:
    title: 日本の生活はどうですか
    content:
    - 'サントス: 日本の生活はどうですか。'
    - '山田一郎: とても便利です。'
    - '山田友子: お茶、いかがですか。'
    - 'サントス: ありがとうございます。失礼します。'
    - '山田一郎: どうぞ。'
    - '山田友子: では、また。'
- node_type: TEXT_ROOT
  id: lesson-009
  content: 第9課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - 料理が好きです。
  - 日本語が少しできます。
  - 子どもの誕生日なので、早く帰ります。
  examples:
  - お酒が好きですか。はい、好きです。
  - どんなスポーツが好きですか。テニスが好きです。
  - 絵が上手ですか。元、全然できません。
  - お金がありますか。元、ありません。
  - 毎朝新聞を読みますか。はい、読みます。
  - どうして早く帰りますか。用事がありますから。
  dialogue:
    title: 残念ですが
    content:
    - 'ミラー: 木村さんですか。ミラーです。'
    - '木村こはる: ああ、ミラーさん。こんばんは。お元気ですか。'
    - 'ミラー: ええ、元気です。あのう、木村さん、クラシックのコンサート、いっしょにいかがですか。'
    - '木村こはる: といいですね。いつですか。'
    - 'ミラー: 来週の金曜日の晩です。'
    - '木村こはる: 金曜日ですか。金曜日の晩はちょっと都合が悪いです。'
    - 'ミラー: だめですか。'
    - '木村こはる: ええ、残念ですが、友達と約束がありますから。'
    - 'ミラー: そうですか。'
    - '木村こはる: ええ、また今度お願いします。'
- node_type: TEXT_ROOT
  id: lesson-010
  content: 第10課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - 部屋に机があります。
  - クラスに佐藤さんがいます。
  - 東京に千葉があります。
  - 家族はニューヨークにいます。
  examples:
  - この部屋にテレビがありますか。はい、2台あります。
  - その部屋に男の人がいますか。
  - 庭に何がいますか。猫がいます。
  - 箱の中に何がありますか。リンゴがあります。
  - 郵便局はどこにありますか。あそこにあります。
  - 事務所はどこにありますか。会議室の後です。
  dialogue:
    title: レストランはありますか
    content:
    - 'ミラー: すみません、レストランはどこですか。'
    - '女の人: レストランですか。あそこに白いビルがありますね。あのビルの中です。'
    - 'ミラー: そうですか。どうもすみません。'
    - 'ミラー: あのう、ナンプラーはありますか。'
    - '店員: はい、あちらにタイ料理のコーナーがあります。ナンプラーは一番下です。'
    - 'ミラー: ありがとう。エレベーターはありますか。'
    - '店員: はい。'
    - 'ミラー: わかりました。どうも。'
- node_type: TEXT_ROOT
  id: lesson-011
  content: 第11課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - 会議室に椅子がたくさんあります。
  - わたしは日本に1年間いました。
  examples:
  - 机の上に本が何冊ありますか。80冊あります。
  - クラスに外国人学生が何人いますか。3人います。
  - ご家族は何人ですか。2人で、兄が1人います。
  - 1週間に何回テニスをしますか。3回します。
  - 山田さんはどのくらい勉強しましたか。1ヶ月勉強しました。
  - どのくらい待ちましたか。一時間半待ちました。
  dialogue:
    title: これお願いします
    content:
    - '管理人: いい天気ですね。お出かけですか。'
    - 'ワン: ええ、ちょっと郵便局まで。'
    - '管理人: そうですか。行ってらっしゃい。'
    - 'ワン: 行ってきます。'
    - 'ワン: これをオーストラリアまでお願いします。'
    - '郵便局員: はい。船便ですか、航空便ですか。'
    - 'ワン: 航空便はいくらですか。'
    - '郵便局員: 7,600円です。'
    - 'ワン: 船便はいくらですか。'
    - '郵便局員: 3,450円です。'
    - 'ワン: どのくらいかかりますか。'
    - '郵便局員: 航空便で7日間、船便で2か月ぐらいです。'
    - 'ワン: では、船便でお願いします。'
- node_type: TEXT_ROOT
  id: lesson-012
  content: 第12課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - 雨が降ります。
  - 風が強いです。
  - 北海道は九州より大きいです。
  - わたしは1年で夏が一番好きです。
  examples:
  - 京都は静かですか。はい、静かです。
  - 旅行は楽しかったですか。はい、とても楽しかったです。
  - 天気はどうでしたか。
  - この本は大きいですか。はい、大きいです。
  - 空はとても青いです。
  - 山と海、どちらが好きですか。海が好きです。
  - 日本の中でどこが一番好きですか。
  dialogue:
    title: 祇園祭はどうでしたか
    content:
    - 'ミラー: ただいま。'
    - '管理人: お帰りなさい。'
    - 'ミラー: これ、京都のお土産です。'
    - '管理人: どうも。すみません、祇園祭はどうでしたか。'
    - 'ミラー: おもしろかったです。とてもにぎやかでした。'
    - '管理人: 祇園祭は京都の祭りでいちばん有名ですからね。'
    - 'ミラー: そうですか。写真をたくさん撮りました。これです。'
    - '管理人: わあ、すごい人出ですね。'
    - 'ミラー: ええ、ちょっと疲れました。'
- node_type: TEXT_ROOT
  id: lesson-013
  content: 第13課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - 寿司が食べたいです。
  - 日本料理を食べに行きます。
  - 映画を見に行きましょう。
  examples:
  - 今何が食べたいですか。
  - どこへ行きたいですか。公園へ行きたいです。
  - 休みの日、何をしたいですか。神社へ行きたいです。
  - 週末何をしますか。美術館へ行ったり勉強したりします。
  - 冬休みどこへ行きますか。元、北海道へ行きません。
  dialogue:
    title: 別々にお願いします
    content:
    - '山田: もう12時ですよ。昼ごはんを食べに行きませんか。'
    - 'ミラー: ええ。'
    - '山田: どこへ行きますか。'
    - 'ミラー: そうですね。今日は日本料理が食べたいですね。'
    - '山田: では、「つるや」へ行きましょう。'
    - '店員: ご注文は？'
    - 'ミラー: わたしはてんぷら定食。'
    - '山田: わたしは牛どん。'
    - '店員: てんぷら定食と牛どんですね。少々お待ちください。'
    - '店員: 1680円でございます。'
    - 'ミラー: すみません。別々にお願いします。'
    - '店員: はい。てんぷら定食は980円、牛どんは700円です。'
- node_type: TEXT_ROOT
  id: lesson-015
  content: 第15課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - この辞書は誰のですか。
  - この本を借りてもいいですか。
  - このかばんはあなたのですか。
  examples:
  - これはあなたの本ですか。元、違います。
  - このペンを借りてもいいですか。はい、どうぞ。
  - この人を知っていますか。元、知りません。
  - 昨日休みでしたか。はい、でした。
  - 結婚していますか。元、独身です。
  - お仕事は何をしていますか。
  dialogue:
    title: ご家族は
    content:
    - '木村: いい映画でしたね。'
    - 'ミラー: ええ、わたしは家族を思い出しました。'
    - '木村: そうですか。ミラーさんのご家族はどうですか。'
    - 'ミラー: 両親と姉が1人います。'
    - '木村: どちらにいらっしゃいますか。'
    - 'ミラー: 両親はニューヨークの近くに住んでいます。姉はロンドンで働いています。木村さんのご家族はどうですか。'
    - '木村: 3人です。父は銀行員です。母は高校で英語を教えています。'
- node_type: TEXT_ROOT
  id: lesson-016
  content: 第16課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - 朝早く会社へ行きます。
  - 公園で散歩をします。
  - 大きな食物を食べます。
  - 明日早く来てください。
  examples:
  - どこで本を読みますか。
  - どの大学に行きますか。
  - 今大阪城で何を学びますか。
  - 公園で何をしますか。
  - 大きな自転車に乗ります。
  - この本はとても可愛いです。
  - あの人は誰ですか。富士大学の学生です。
  dialogue:
    title: 使い方を教えてください
    content:
    - 'トリス: すみませんが、ちょっと使い方を教えてください。'
    - '銀行員: お引き出しですか。'
    - 'マリア: そうです。'
    - '銀行員: じゃ、まずここを押してください。'
    - 'マリア: はい。'
    - '銀行員: 次にキャッシュカードをここに入れて、暗証番号を押してください。'
    - 'マリア: はい。押しました。'
    - '銀行員: じゃ、金額を押してください。'
    - 'マリア: 5万円ですが、5……。'
    - '銀行員: この「万」「円」を押します。それからこの「確認」ボタンを押してください。'
    - 'マリア: はい。どうもありがとうございました。'
- node_type: TEXT_ROOT
  id: lesson-017
  content: 第17課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - 写真を撮らないでください。
  - パスポートを見せなければなりません。
  - 日曜日は早く起きなければなりません。
  examples:
  - 駅に正確に着かなければなりませんか。いいえ、大丈夫です。
  - 12時までに帰らなければなりませんか。元、大丈夫です。
  - 今晩に仕事を終わらせなければなりません。はい、でも、早く終わらせます。
  - 手数料を現金で払わなければなりますか。
  - 部屋を一緒に片付けなければなりませんか。
  dialogue:
    title: 医者へ
    content:
    - '医者: どうしましたか。'
    - '松本: 頭が痛いです。'
    - '医者: 熱はありますか。'
    - '松本: はい、少しあります。'
    - '医者: どのくらいですか。'
    - '松本: 昨日からです。あと、東京へ出張しなければなりません。'
    - '医者: では、早く寝てください。'
    - '松本: はい。'
    - '医者: 今晚お風呂に入らないでください。'
    - '松本: はい、ありがとうございます。'
    - '医者: では、お大事に。'
- node_type: TEXT_ROOT
  id: lesson-018
  content: 第18課
  content_json:
    level: N5
    book: 初级上册
    type: lesson
  patterns:
  - わたしは漢字を少し書けます。
  - 趣味は切手を集めることです。
  - では、記入してください。
  examples:
  - 車を運転できますか。はい、できます。/元、できません。
